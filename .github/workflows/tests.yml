name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # torch and transformers are mocked inside test_all.py so they do not
      # need to be installed.  Installing only the lightweight packages keeps
      # the job fast (< 1 min vs 10+ min with torch).
      - name: Install test dependencies
        run: |
          pip install \
            pymupdf==1.27.2.2 \
            pyyaml==6.0.3 \
            pandas==3.0.2 \
            pytest==9.0.3

      - name: Run pytest
        run: |
          pytest test_all.py \
            --tb=short \
            --verbose \
            --junitxml=test-results.xml

      # Publish a test-results summary that appears on every PR and commit page
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()               # upload even when tests fail
        with:
          name: test-results
          path: test-results.xml
