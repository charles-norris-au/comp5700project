element118:
  name: Restrict Administrator Privileges to Dedicated Administrator Accounts
  requirements:
  - Restrict administrator privileges to dedicated administrator accounts
  - on enterprise assets.
  - Conduct general computing activities, such as internet browsing, email, and productivity
    suite use, from the user’s primary, non-privileged account.
  - Ensure that all users with administrative account access use a dedicated or secondary
    account for elevated activities.
  - This account should only be used for administrative activities and not internet
    browsing, email, or similar activities.
  - There should be at least one PodSecurityPolicy (PSP) defined which does not permit
    containers to share the host IPC namespace.
  - If you need to run containers which require hostIPC, this should be defined in
    a separate PSP and you should carefully check RBAC controls to ensure that only
    limited service accounts and users are given permission to access that PSP.
  - By default, PodSecurityPolicies are not defined.
